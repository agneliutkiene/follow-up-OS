<svg xmlns="http://www.w3.org/2000/svg" width="720" height="520" viewBox="0 0 720 520" fill="none" role="img" aria-labelledby="t d">
  <title id="t">NoSlip hero 3D placeholder</title>
  <desc id="d">Abstract stacked UI cards and panels with gradients and shadows</desc>

  <defs>
    <linearGradient id="bgGrad" x1="108" y1="64" x2="602" y2="468" gradientUnits="userSpaceOnUse">
