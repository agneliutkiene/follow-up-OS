  <rect x="0" y="0" width="1120" height="140" rx="16" fill="rgba(15,23,42,0.45)"/>

  <g fill="#CBD5E1" opacity="0.9" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="20" font-weight="600">
